version: "3.8"

services:
  edurisk:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: edurisk-ai
    ports:
      - "7860:7860"
    volumes:
      - ../models:/app/models
      - ../data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - EDURISK_LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
